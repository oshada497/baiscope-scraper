services:
  - type: web
    name: subtitle-scraper
    env: python
    runtime: python-3.11
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python multi_site_scraper.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_API_TOKEN
        sync: false
      - key: D1_DATABASE_ID
        sync: false
      - key: SCRAPE_SITES
        value: baiscope,zoom,subz
      - key: MAX_PAGES
        value: 30
